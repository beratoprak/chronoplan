<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 160" fill="none">
  <defs>
    <filter id="texture" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <!-- Horizontal bar of T -->
  <rect x="10" y="22" width="100" height="10" rx="1" fill="#6B5B3E" filter="url(#texture)" opacity="0.9"/>
  <!-- Left serif of T bar -->
  <polygon points="10,22 10,32 16,32 16,22" fill="#5A4A30" opacity="0.85"/>
  <!-- Right serif of T bar -->
  <polygon points="104,22 104,32 110,32 110,22" fill="#5A4A30" opacity="0.85"/>
  <!-- Vertical stem of T -->
  <rect x="54" y="22" width="12" height="118" rx="1" fill="#6B5B3E" filter="url(#texture)" opacity="0.9"/>
  <!-- Bottom serif -->
  <rect x="48" y="132" width="24" height="6" rx="1" fill="#5A4A30" opacity="0.85"/>
  <!-- Shadow/depth lines -->
  <line x1="56" y1="22" x2="56" y2="138" stroke="#8B7355" stroke-width="0.5" opacity="0.4"/>
  <line x1="12" y1="24" x2="108" y2="24" stroke="#8B7355" stroke-width="0.5" opacity="0.4"/>
</svg>
